services:
  db:
    container_name: softwareengineering-database
    image: postgres
    env_file: ".env"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./sql/init_dbs.sh:/docker-entrypoint-initdb.d/01_init_dbs.sh
      - ./sql/tables.sql:/tmp/tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: softwareengineering-backend
    env_file: ".env"
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - HOKIDAR_USEPOLLING=true
    network_mode: "host"
    volumes:
      - ./:/app
      - /app/node_modules
      - /var/run/dbus:/var/run/dbus
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: {}
